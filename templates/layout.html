<!DOCTYPE html>
<html lang="en">

<head>
  <title>Project AI - The Future of Learning Integrity</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="120x120"
    href="{{ url_for('static', filename='assets/img/favicon/apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32"
    href="{{ url_for('static', filename='assets/img/favicon/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16"
    href="{{ url_for('static', filename='assets/img/favicon/favicon-16x16.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='assets/img/favicon/site.webmanifest') }}">
  <link rel="mask-icon" color="#ffffff"
    href="{{ url_for('static', filename='assets/img/favicon/safari-pinned-tab.svg') }}">

  <!-- Fontawesome -->
  <link type="text/css" rel="stylesheet"
    href="{{ url_for('static', filename='vendor/@fortawesome/fontawesome-free/css/all.min.css') }}">

  <!-- Pixel CSS -->
  <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='css/pixel.css') }}">
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- Futuristic Redesign CSS -->
  <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='css/futuristic.css') }}">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  {% block head %}{% endblock %}
</head>

<body class="content-bg">
  {% include 'includes/_navbar.html' %}
  <!--<div class="container">-->
  {% include 'includes/_messages.html' %}
  {% block body %}{% endblock %}
  <!--</div>-->

  <!-- Place this tag in your head or just before your close body tag. -->
  <script async defer src="https://buttons.github.io/buttons.js"></script>

  <!-- Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

  <script src="{{ url_for('static', filename='vendor/popper.js/dist/umd/popper.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap/dist/js/bootstrap.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/headroom.js/dist/headroom.min.js') }}"></script>

  <!-- Vendor JS -->
  <script src="{{ url_for('static', filename='vendor/onscreen/dist/on-screen.umd.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/nouislider/distribute/nouislider.min.js') }}"></script>
  <script
    src="{{ url_for('static', filename='vendor/bootstrap-datepicker/dist/js/bootstrap-datepicker.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/waypoints/lib/jquery.waypoints.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/jarallax/dist/jarallax.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/jquery.counterup/jquery.counterup.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/jquery-countdown/dist/jquery.countdown.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/smooth-scroll/dist/smooth-scroll.polyfills.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/prismjs/prism.js') }}"></script>

  <script async defer src="https://buttons.github.io/buttons.js"></script>

  <!-- pixel JS -->
  <script src="{{ url_for('static', filename='assets/js/pixel.js') }}"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

  <!-- VanillaTilt and AOS JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize Animate On Scroll
    AOS.init({
      duration: 800,
      once: true,
      easing: 'ease-out-cubic'
    });

    // Initialize VanillaTilt for glass cards
    document.addEventListener("DOMContentLoaded", function () {
      VanillaTilt.init(document.querySelectorAll(".glass-card"), {
        max: 5,
        speed: 400,
        glare: true,
        "max-glare": 0.2,
        scale: 1.02
      });
    });
  </script>

  <footer id="sticky-footer" class="py-4 sticky-footer-futuristic mt-5">
    <div class="d-flex text-center justify-content-center align-items-center" role="contentinfo">
      <p class="font-weight-bold font-medium mb-0" style="color: var(--text-main);">Copyright © Project AI
        <span class="current-year" style="color: var(--neon-cyan);">
          <script>document.write(new Date().getFullYear())</script>
        </span>. All rights reserved.
      </p>
    </div><br>
    <div class="d-flex text-center justify-content-center align-items-center" role="contentinfo">
      <p class="font-weight-bold font-small mb-0"><span><a href="https://www.linkedin.com/in/aditya-ranjan-swain/"
            style="color: var(--neon-purple); text-decoration: none;">Made
            with &#128151 By ADITYA RANJAN SWAIN</a></span></p>
    </div>
  </footer>
</body>

</html>
